{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container">
    <div class="content-wrapper">
        <h2 class="mt-4">Contact Us</h2>
        <p class="lead">We'd love to hear from you! Please fill out the form below to send us a message.</p>

        {% if messages %}
            <div class="alert alert-info mt-3">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post" class="mt-3">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary mt-3 btn-block">Send Message</button>
        </form>
    </div>
</div>
{% endblock %}
