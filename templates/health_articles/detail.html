{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="card shadow-sm">
      {% if article.image %}
      <img src="{{ article.image.url }}" class="card-img-top" style="object-fit: cover; height: 400px;" alt="{{ article.title }}">
      {% else %}
      <img src="{% static 'default.jpg' %}" class="card-img-top" style="object-fit: cover; height: 400px;" alt="No image">
      {% endif %}
      
      <div class="card-body">
        <h2 class="card-title">{{ article.title }}</h2>
        <p class="badge 
          {% if article.category == 'cancer' %}bg-danger
          {% elif article.category == 'mental_health' %}bg-info
          {% elif article.category == 'fitness' %}bg-success
          {% elif article.category == 'nutrition' %}bg-warning text-dark
          {% else %}bg-secondary
          {% endif %}">
          {{ article.get_category_display }}
        </p>

        <p>{{ article.content }}</p>
        <p class="text-muted mt-3 mb-0">
          <i class="bi bi-calendar"></i> Published on: {{ article.published_at|date:"F j, Y, g:i a" }}
        </p>
      </div>

      <div class="card-footer">
        <a href="{% url 'healtharticle_list' %}" class="btn btn-secondary">← Back to List</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
