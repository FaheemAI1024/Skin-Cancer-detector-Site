<!-- templates/health_topics/detail.html -->

{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container my-5">

    <div class="row justify-content-center">
        <div class="col-lg-10">

            <!-- Topic Card -->
            <div class="card border-0 shadow-lg overflow-hidden">

                <!-- Cover Image -->
                {% if topic.image %}
                <div style="height: 350px; overflow: hidden;">
                    <img src="{{ topic.image.url }}" class="w-100 h-100" alt="{{ topic.title }}"
                         style="object-fit: cover;">
                </div>
                {% else %}
                <div style="height: 350px; overflow: hidden;">
                    <img src="{% static 'default.jpg' %}" class="w-100 h-100" alt="No Image Available"
                         style="object-fit: cover;">
                </div>
                {% endif %}

                <!-- Content Section -->
                <div class="card-body p-4">

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h2 class="card-title text-primary mb-0">
                            <i class="bi bi-info-circle-fill me-2"></i>{{ topic.title }}
                        </h2>
                        <span class="badge 
                            {% if topic.category == 'cancer' %}bg-danger
                            {% elif topic.category == 'mental_health' %}bg-info
                            {% elif topic.category == 'fitness' %}bg-success
                            {% elif topic.category == 'nutrition' %}bg-warning text-dark
                            {% else %}bg-secondary
                            {% endif %} px-3 py-2 text-uppercase small">
                            {{ topic.get_category_display }}
                        </span>
                    </div>

                    <hr>

                    <!-- Content -->
                    <div class="mb-4" style="font-size: 1.05rem; line-height: 1.7;">
                        {{ topic.content|linebreaks }}
                    </div>

                    <!-- Meta Info -->
                    <div class="text-muted small">
                        <i class="bi bi-calendar-event me-1"></i>
                        Published on {{ topic.published_at|date:"F j, Y • g:i a" }}
                    </div>
                </div>

                <!-- Footer Actions -->
                <div class="card-footer bg-white border-top py-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                       
                        </div>
                        <a href="{% url 'healthtopic_list' %}" class="btn btn-secondary">
                            ← Back to List
                        </a>
                    </div>
                </div>

            </div>

        </div>
    </div>

</div>
{% endblock %}
