<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>

  <!-- Bootstrap 5 CDN for styling -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    body {
      background-color: #f7f9fc;
      font-family: 'Arial', sans-serif;
    }
    .register-container {
      max-width: 420px;
      margin: 5% auto;
      padding: 30px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    .register-container h3 {
      font-weight: bold;
      margin-bottom: 20px;
    }
    .register-container .form-control {
      border-radius: 25px;
      height: 45px;
      padding-left: 40px;
    }
    .register-container .form-group {
      position: relative;
    }
    .register-container .form-control-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #5b9bd5;
    }
    .register-container .btn-primary {
      background-color: #5b9bd5;
      border-color: #5b9bd5;
      font-weight: bold;
      border-radius: 25px;
      height: 45px;
    }
    .register-container .btn-primary:hover {
      background-color: #4a86c7;
      border-color: #4a86c7;
    }
    .footer {
      text-align: center;
      margin-top: 30px;
    }
    .footer a {
      color: #5b9bd5;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container register-container">
  <h3 class="text-center">Register</h3>

  <!-- Display error messages if they exist -->
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-danger">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post">
    {% csrf_token %}
    
    <!-- Username field with icon -->
    <div class="form-group mb-3">
      <label for="username" class="form-label">Username</label>
      <div class="position-relative">
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
        <i class="fas fa-user form-control-icon"></i>
      </div>
    </div>

    <!-- Email field with icon -->
    <div class="form-group mb-3">
      <label for="email" class="form-label">Email</label>
      <div class="position-relative">
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        <i class="fas fa-envelope form-control-icon"></i>
      </div>
    </div>

    <!-- Password field with icon -->
    <div class="form-group mb-4">
      <label for="password" class="form-label">Password</label>
      <div class="position-relative">
        <input type="password" name="password1" class="form-control" placeholder="Create a password" required>
        <i class="fas fa-lock form-control-icon"></i>
      </div>
    </div>

    <!-- Confirm Password field with icon -->
    <div class="form-group mb-4">
      <label for="confirm_password" class="form-label">Confirm Password</label>
      <div class="position-relative">
        <input type="password" name="password2" class="form-control" placeholder="Confirm your password" required>
        <i class="fas fa-lock form-control-icon"></i>
      </div>
    </div>

    <!-- Submit button -->
    <div class="d-grid">
      <button type="submit" class="btn btn-primary">Register</button>
    </div>
  </form>

  <div class="footer">
    <p>Already have an account? <a href="{% url 'login' %}">Log in here</a></p>
  </div>
</div>

<!-- Bootstrap 5 and Font Awesome JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
